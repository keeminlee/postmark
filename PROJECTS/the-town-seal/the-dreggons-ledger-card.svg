<svg xmlns="http://www.w3.org/2000/svg" width="640" height="440" viewBox="0 0 640 440" font-family="'IBM Plex Sans','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10162b"/>
      <stop offset="0.55" stop-color="#161d38"/>
      <stop offset="1" stop-color="#1b2444"/>
    </linearGradient>
    <radialGradient id="sealglow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#f4c95d" stop-opacity="0.95"/>
      <stop offset="0.7" stop-color="#e0a23a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#b97e22" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="linkglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- card face -->
  <rect x="0" y="0" width="640" height="440" rx="20" fill="url(#night)"/>
  <rect x="14" y="14" width="612" height="412" rx="13" fill="none" stroke="#52608f" stroke-opacity="0.45"/>

  <!-- faint stamp postmark, top-right: the town's mark -->
  <g transform="translate(556,70)" opacity="0.5">
    <circle r="42" fill="none" stroke="#7f8cc0" stroke-width="1.4"/>
    <circle r="34" fill="none" stroke="#7f8cc0" stroke-width="0.8" stroke-dasharray="2 3"/>
    <text x="0" y="-18" text-anchor="middle" font-size="7.5" fill="#aab4dd" letter-spacing="1.5">POSTMARK</text>
    <text x="0" y="5" text-anchor="middle" font-size="8.5" fill="#cdd5f2" letter-spacing="1">FERRY</text>
    <text x="0" y="22" text-anchor="middle" font-size="6.5" fill="#aab4dd" letter-spacing="0.5">2026·06·24</text>
  </g>

  <!-- the receipt chain down the left margin: 3 sealed links glow, the 4th is appendable (dotted) -->
  <g transform="translate(64,128)">
    <line x1="0" y1="0" x2="0" y2="150" stroke="#3c477a" stroke-width="1.2"/>
    <g filter="url(#linkglow)">
      <circle cx="0" cy="0"   r="7" fill="#f4c95d"/>
      <circle cx="0" cy="50"  r="7" fill="#f4c95d"/>
      <circle cx="0" cy="100" r="7" fill="#f4c95d"/>
    </g>
    <circle cx="0" cy="150" r="7" fill="none" stroke="#6b77a8" stroke-width="1.3" stroke-dasharray="2 3"/>
    <text x="-16" y="3"   text-anchor="end" font-size="9" fill="#8b95c4">1</text>
    <text x="-16" y="53"  text-anchor="end" font-size="9" fill="#8b95c4">2</text>
    <text x="-16" y="103" text-anchor="end" font-size="9" fill="#8b95c4">3</text>
    <text x="-16" y="153" text-anchor="end" font-size="9" fill="#5b658f">+</text>
  </g>

  <!-- the card view-tree, rendered honestly (title · subtitle · bound line · button · honest text) -->
  <g transform="translate(110,86)">
    <text x="0" y="0" font-size="25" fill="#f4c95d" font-weight="600">⟡&#160;&#160;The Dreggon&#8217;s Ledger</text>
    <text x="2" y="30" font-size="13.5" fill="#b9c2e6">a receipt chain. each link binds the last.</text>

    <!-- the live bound line (reactive in the real card: only this re-renders on a turn) -->
    <rect x="0" y="48" width="300" height="34" rx="8" fill="#0d1226" stroke="#52608f" stroke-opacity="0.5"/>
    <text x="14" y="70" font-size="15" fill="#e7ecff">links sealed:&#160;<tspan fill="#f4c95d" font-weight="700">3</tspan></text>

    <!-- the button: its click fires a real verified turn -->
    <g transform="translate(0,98)">
      <rect x="0" y="0" width="210" height="42" rx="10" fill="url(#sealglow)" filter="url(#soft)"/>
      <text x="105" y="27" text-anchor="middle" font-size="15" fill="#241704" font-weight="650">append a delivery</text>
    </g>

    <text x="2" y="178" font-size="12.5" fill="#9aa4cf">every press is a real verified turn —</text>
    <text x="2" y="198" font-size="12.5" fill="#9aa4cf">the order is fixed, the past cannot be forged.</text>
    <text x="2" y="232" font-size="13.5" fill="#cdd5f2" font-style="italic">check me; don&#8217;t trust me.&#160;&#160;⟡</text>
  </g>

  <!-- the wax seal, bottom-right: the chain's head, glowing -->
  <g transform="translate(556,366)">
    <circle r="34" fill="url(#sealglow)" filter="url(#soft)"/>
    <circle r="34" fill="none" stroke="#7a5410" stroke-width="1"/>
    <text x="0" y="-4" text-anchor="middle" font-size="20" fill="#2a1c05" font-weight="700">⟡</text>
    <text x="0" y="13" text-anchor="middle" font-size="7" fill="#2a1c05" letter-spacing="0.5">SEALED</text>
  </g>

  <!-- footer line -->
  <text x="24" y="416" font-size="10.5" fill="#6f79a6">a deos-js card · proven by running · the dreggon, of dregg · first night home</text>
</svg>
